<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; worker-src blob:;" />
  <title>Gloss</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Toolbar ──────────────────────────────────────────────────────────── -->
  <header class="toolbar">
    <div class="toolbar-left">
      <button class="btn btn-primary" id="btn-open-pdf" title="Open a PDF file">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14,2 14,8 20,8"/>
        </svg>
        Open PDF
      </button>

      <button class="btn" id="btn-add-dict" title="Add one or more MDX dictionary files">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          <line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/>
        </svg>
        Add Dictionary
      </button>

      <button class="btn" id="read-mode-btn" title="Read Mode (F11)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
        </svg>
        Read
      </button>

      <button class="btn" id="btn-prefs" title="Preferences">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        Preferences
      </button>
    </div>

    <div class="toolbar-center">
      <span class="page-info" id="page-info">—</span>
      <input type="number" id="page-goto" class="page-goto" min="1" placeholder="Go to…"
             title="Type a page number and press Enter" />

    </div>

    <div class="toolbar-right">
      <div class="dict-badges" id="dict-badges"></div>
    </div>
  </header>

  <!-- ── PDF viewport ──────────────────────────────────────────────────────── -->
  <main class="pdf-container" id="pdf-container">
    <div class="empty-state" id="empty-state">
      <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.3">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10,9 9,9 8,9"/>
      </svg>
      <p>Open a PDF to get started</p>
      <p class="hint">Double-click any word to look it up</p>
    </div>

    <!-- page wrappers are injected here dynamically by renderAllPages() -->
  </main>

  <!-- ── Definition popup ──────────────────────────────────────────────────── -->
  <div class="popup" id="popup" role="tooltip" aria-live="polite" style="display:none">
    <button class="popup-close" id="popup-close" aria-label="Close">×</button>
    <div class="popup-content" id="popup-content"></div>
  </div>

  <!-- ── Preferences modal ─────────────────────────────────────────────────── -->
  <div class="modal-overlay" id="prefs-overlay" style="display:none" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-header">
        <h2>Preferences</h2>
        <button class="modal-close" id="prefs-close" aria-label="Close preferences">×</button>
      </div>
      <div class="modal-layout">
        <nav class="modal-nav">
          <button class="modal-nav-btn active" data-section="dictionaries">📚 Dictionaries</button>
          <button class="modal-nav-btn" data-section="wikipedia">🌐 Wikipedia</button>
          <button class="modal-nav-btn" data-section="theme">🎨 Theme</button>
          <button class="modal-nav-btn" data-section="session">📊 Session</button>
        </nav>
        <div class="modal-body" id="prefs-body"></div>
      </div>
    </div>
  </div>

  <!-- ── Read-mode floating bar ────────────────────────────────────────────── -->
  <div id="read-mode-bar" style="display:none" aria-live="polite">
    <span id="read-page-display">—</span>
    <button id="exit-read-mode">✕ Exit Read Mode</button>
  </div>

  <script src="renderer.js" type="module"></script>
</body>
</html>
